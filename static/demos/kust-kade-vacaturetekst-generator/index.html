<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacaturetekst Generator · Kust & Kade Lab</title>
  <meta name="description" content="Snel een inclusieve en professionele vacaturetekst schrijven? Gebruik de gratis AI Vacaturetekst Generator van Kust & Kade. Speciaal voor HR-professionals.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232E3128'/%3E%3Cpath d='M2 20 C6 14, 10 26, 14 20 C18 14, 22 26, 26 20 C28 17, 30 18, 30 20' stroke='%232C5F6E' stroke-width='2.5' stroke-linecap='round' fill='none'/%3E%3Cpath d='M2 24 C6 18, 10 30, 14 24 C18 18, 22 30, 26 24 C28 21, 30 22, 30 24' stroke='%233A7A8C' stroke-width='2' stroke-linecap='round' fill='none' opacity='0.7'/%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    :root {
      /* ── Kust & Kade brand tokens ── */
      --bg:           #F5F3EC;
      --bg-alt:       #EDEAE2;
      --bg-warm:      #F0EDE4;
      --card-bg:      #FDFCF9;
      --text:         #2E3128;
      --text-muted:   #5C5F56;
      --accent:       #2C5F6E;
      --accent-light: #3A7A8C;
      --accent-glow:  #4A9AAE;
      --accent-deep:  #1E4552;
      --accent-pale:  #E8F2F4;
      --border:       #D4D0C8;
      --dark:         #2E3128;
      --sand:         #C8BFA8;
      --success:      #7BA45E;
      --warning:      #D9A84B;
      --error:        #B7564C;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    h1, h2, h3 { font-family: 'Libre Baskerville', serif; }
    h1 { font-size: 2.5rem; margin: 0.5rem 0; }
    h2 { font-size: 2rem; margin: 1rem 0; }
    h3 { font-size: 1.5rem; margin: 0.75rem 0; }

    .container { max-width: 1000px; margin: 0 auto; padding: 0 1.5rem; }

    header {
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 600; font-size: 1.25rem; }
    nav { display: flex; gap: 2rem; }
    nav a { color: var(--accent); text-decoration: none; }
    nav a:hover { text-decoration: underline; }

    main { padding: 2rem 0; }

    .hero {
      background: linear-gradient(135deg, var(--bg-warm) 0%, var(--bg-alt) 100%);
      padding: 3rem 0;
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero h1 { margin-bottom: 1rem; }
    .hero p { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    .cta { background: var(--accent); color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; border-radius: 0.375rem; cursor: pointer; }
    .cta:hover { background: var(--accent-light); }

    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    input, textarea, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.375rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; }
    textarea { resize: vertical; min-height: 120px; }

    .form-container { background: var(--card-bg); padding: 2rem; border-radius: 0.5rem; border: 1px solid var(--border); max-width: 600px; margin: 2rem auto; }

    .output-box { background: var(--bg-alt); padding: 1.5rem; border-radius: 0.375rem; border-left: 4px solid var(--accent); margin-top: 2rem; }
    .output-box h3 { margin-top: 0; }
    .output-box p { margin: 0.5rem 0; color: var(--text-muted); white-space: pre-wrap; word-wrap: break-word; }

    footer { background: var(--bg-alt); border-top: 1px solid var(--border); padding: 2rem 0; text-align: center; color: var(--text-muted); }

    @media (max-width: 768px) {
      h1 { font-size: 1.75rem; }
      h2 { font-size: 1.5rem; }
      .header-content { flex-direction: column; gap: 1rem; }
      nav { gap: 1rem; flex-direction: column; }
      .form-container { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="logo">Kust & Kade Lab</div>
      <nav>
        <a href="/">Home</a>
        <a href="#">Features</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Vacaturetekst Generator</h1>
        <p>Schrijf in minuten een inclusieve, aantrekkelijke vacaturetekst met AI</p>
        <button class="cta" onclick="document.querySelector('.form-container').scrollIntoView({ behavior: 'smooth' })">Aan de slag</button>
      </div>
    </section>

    <section class="container">
      <div class="form-container">
        <h2>Genereer jouw vacaturetekst</h2>
        
        <div class="form-group">
          <label for="jobTitle">Functie titel</label>
          <input type="text" id="jobTitle" placeholder="bijv. Product Manager" />
        </div>

        <div class="form-group">
          <label for="department">Afdeling</label>
          <input type="text" id="department" placeholder="bijv. Product & Engineering" />
        </div>

        <div class="form-group">
          <label for="description">Korte beschrijving van de rol</label>
          <textarea id="description" placeholder="Wat gaat deze persoon doen? Wat zijn de key responsibilities?"></textarea>
        </div>

        <div class="form-group">
          <label for="requirements">Vereisten (één per regel)</label>
          <textarea id="requirements" placeholder="bijv.\n- 5 jaar ervaring\n- Fluent in English"></textarea>
        </div>

        <div class="form-group">
          <label for="tone">Toon van de vacaturetekst</label>
          <select id="tone">
            <option value="professional">Professioneel</option>
            <option value="friendly">Vriendelijk & informeel</option>
            <option value="energetic">Energiek & motiverend</option>
            <option value="formal">Formeel</option>
          </select>
        </div>

        <button class="cta" onclick="generateVacancy()" style="width: 100%;">Genereer vacaturetekst</button>

        <div id="output" style="display: none;">
          <div class="output-box">
            <h3>Jouw vacaturetekst</h3>
            <p id="generatedText"></p>
            <button class="cta" onclick="copyToClipboard()" style="width: 100%; margin-top: 1rem;">Kopieer naar clipboard</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2024 Kust & Kade. Alle rechten voorbehouden.</p>
    </div>
  </footer>

  <script>
    function generateVacancy() {
      const jobTitle = document.getElementById('jobTitle').value;
      const department = document.getElementById('department').value;
      const description = document.getElementById('description').value;
      const requirements = document.getElementById('requirements').value;
      const tone = document.getElementById('tone').value;

      if (!jobTitle || !description) {
        alert('Vul minimaal functie titel en beschrijving in');
        return;
      }

      const templates = {
        professional: ` We zoeken een ${jobTitle} voor onze ${department} afdeling.\n\n${description}\n\nVereisten:\n${requirements || 'Relevante ervaring en kennis in dit vakgebied.'}\n\nWe bieden:\n- Competitief salaris\n- Flexibele werktijden\n- Professionele ontwikkeling`,
        friendly: `Wij zoeken een fijne ${jobTitle}!\n\nBen jij enthousiast over ${description}? Dan willen wij je graag ontmoeten. Je wordt onderdeel van ons team in de ${department} afdeling.\n\nDe ideale kandidaat:\n${requirements || 'Iemand die net als wij dingen wil verbeteren.'}\n\nWat wij bieden:\n- Een inspirerend team\n- Veel vrijheid en verantwoordelijkheid\n- Mogelijkheden voor groei`,
        energetic: `Join us! We're looking for an energetic ${jobTitle}!\n\nRe jij klaar om impact te maken? We zoeken jou voor onze ${department} afdeling om mee te bouwen aan toekomst.\n\nJij bent:\n${requirements || 'Proactief, leergierig en gedreven.'}\n\nJij krijgt:\n- Een energiek team\n- Autonomie en vertrouwen\n- Onbeperkte groei- mogelijkheden`,
        formal: `Positie: ${jobTitle}\nAfdeling: ${department}\n\nFunctieomschrijving:\n${description}\n\nVereiste qualificaties:\n${requirements || 'Relevant beroepservaring en expertise.'}\n\nBenefits:\n- Marktconform salaris\n- Uitgebreide uitkeringspakket\n- Professionele ontwikkeling`
      };

      const output = templates[tone] || templates.professional;
      document.getElementById('generatedText').textContent = output;
      document.getElementById('output').style.display = 'block';
      document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
    }

    function copyToClipboard() {
      const text = document.getElementById('generatedText').textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert('Tekst gekopieerd naar clipboard!');
      });
    }
  </script>
</body>
</html>
